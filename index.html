<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Riksan TT Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-white">

    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <h1 class="text-4xl font-black bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">RIKSAN PROJECT</h1>
            <p class="text-slate-400 mt-2">Premium TikTok Downloader No Watermark</p>
        </div>

        <div class="glass p-6 rounded-[2rem] shadow-2xl">
            <input type="text" id="tiktokUrl" placeholder="Paste link TikTok di sini..." 
                class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl px-5 py-4 text-sm focus:border-cyan-500 outline-none transition-all mb-4 text-white">
            
            <button id="btnAction" class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-bold py-4 rounded-2xl transition-all shadow-lg shadow-cyan-500/20 active:scale-95">
                Ambil Video
            </button>
        </div>

        <div id="loader" class="hidden flex justify-center"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-cyan-500"></div></div>

        <div id="result" class="hidden glass p-5 rounded-[2rem] space-y-4">
            <img id="thumb" src="" class="w-full aspect-video object-cover rounded-2xl border border-white/5 shadow-lg">
            <div>
                <h3 id="author" class="text-cyan-400 font-bold"></h3>
                <p id="desc" class="text-slate-400 text-xs line-clamp-2"></p>
            </div>
            <a id="downloadLink" href="#" class="block w-full py-4 bg-white text-slate-900 text-center font-bold rounded-2xl hover:bg-cyan-50 transition-all">
                Download ke Galeri
            </a>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
