<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riksan TT Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .cyber-shadow { box-shadow: 0 0 20px rgba(34, 211, 238, 0.2); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                TT Downloader
            </h1>
            <p class="text-slate-400 text-sm mt-2">Download video TikTok tanpa watermark</p>
        </div>

        <div class="glass p-6 rounded-3xl space-y-4 cyber-shadow">
            <div>
                <label class="block text-xs font-semibold text-cyan-400 uppercase tracking-wider mb-2">Paste Link Video</label>
                <input type="text" id="tiktokUrl" 
                    placeholder="https://www.tiktok.com/@..." 
                    class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-cyan-500 transition-all text-white placeholder-slate-500">
            </div>
            
            <button id="btnAction" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-3 rounded-xl transition-all duration-300 transform active:scale-95 shadow-lg shadow-cyan-500/20">
                Ambil Video
            </button>
        </div>

        <div id="loader" class="hidden flex justify-center py-4">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-cyan-500"></div>
        </div>

        <div id="result" class="hidden glass p-4 rounded-3xl space-y-4 animate-fade-in">
            <img id="thumb" src="" alt="Thumbnail" class="w-full h-48 object-cover rounded-2xl border border-white/10">
            
            <div class="space-y-1">
                <h3 id="author" class="text-cyan-400 font-bold text-sm"></h3>
                <p id="desc" class="text-slate-300 text-xs line-clamp-2"></p>
            </div>

            <a id="downloadLink" href="#" target="_blank" 
               class="block w-full text-center bg-white text-slate-900 font-bold py-3 rounded-xl hover:bg-cyan-100 transition-all shadow-xl">
                Download Video Sekarang
            </a>
        </div>

        <div class="text-center text-slate-500 text-[10px] uppercase tracking-[0.2em]">
            &copy; 2026 Riksan Project • CTO of SawargiPay
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
